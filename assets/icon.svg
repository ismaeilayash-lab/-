<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="#1a5c3d"/>
  
  <!-- Kaaba shape -->
  <g transform="translate(256, 256)">
    <!-- Green border/arch -->
    <path d="M -80 -60 Q -80 -100 0 -120 Q 80 -100 80 -60" fill="none" stroke="#c9a852" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Main Kaaba building (black) -->
    <rect x="-50" y="-40" width="100" height="80" fill="#1a1a1a" stroke="#c9a852" stroke-width="2"/>
    
    <!-- Door of Kaaba -->
    <rect x="-15" y="-30" width="30" height="40" fill="#4a4a4a" stroke="#c9a852" stroke-width="1"/>
    
    <!-- Gold bands -->
    <line x1="-50" y1="-10" x2="50" y2="-10" stroke="#c9a852" stroke-width="4"/>
    <line x1="-50" y1="15" x2="50" y2="15" stroke="#c9a852" stroke-width="4"/>
    
    <!-- Bottom arch -->
    <path d="M -90 50 Q 0 80 90 50" fill="none" stroke="#c9a852" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Book/Quran at bottom -->
    <rect x="-60" y="70" width="120" height="15" fill="#c9a852" rx="2"/>
    <line x1="-60" y1="77.5" x2="60" y2="77.5" stroke="#1a5c3d" stroke-width="2"/>
  </g>
  
  <!-- Text: Zad Al-Hajj -->
  <text x="256" y="420" font-size="32" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">زاد الحاج</text>
</svg>