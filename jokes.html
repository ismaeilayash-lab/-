<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Random Joke Generator - Get laughs with jokes from multiple categories">
    <meta name="theme-color" content="#667eea">
    <title>Random Joke Generator 😂</title>
    <link rel="stylesheet" href="css/jokes.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>😂 Joke Generator</h1>
            <p>Get random jokes and add your favorites</p>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Controls -->
            <div class="controls">
                <div class="control-group">
                    <label for="jokeType">Select Category:</label>
                    <select id="jokeType">
                        <option value="all">Any Type</option>
                        <option value="general">General</option>
                        <option value="programming">Programming</option>
                        <option value="knock-knock">Knock-Knock</option>
                    </select>
                </div>

                <button id="getJokeBtn" class="btn-primary">Get Joke</button>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-message"></div>

            <!-- Loading -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>

            <!-- Joke Display -->
            <div class="joke-container">
                <div id="jokeContent" class="joke-content">
                    Click "Get Joke" to start! 🎲
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="shareBtn" class="btn-secondary">📤 Share</button>
                <button id="favoriteBtn" class="btn-tertiary">⭐ Add to Favorites</button>
            </div>

            <!-- Favorites Section -->
            <div class="favorites-section">
                <h2>⭐ My Favorites</h2>
                <div id="favoritesList" class="favorites-list">
                    <p class="empty-message">No favorites yet</p>
                </div>
                <div class="favorites-buttons">
                    <button id="clearFavoritesBtn" class="btn-secondary">Clear All</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jokes.js"></script>
</body>
</html>
